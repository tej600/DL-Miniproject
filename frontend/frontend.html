<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Colorization Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #020617;
  border-right: 1px solid #1e293b;
  padding: 20px;
}

.sidebar h2 {
  color: #38bdf8;
}

.sidebar p {
  color: #94a3b8;
  font-size: 13px;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  color: #38bdf8;
}

/* CARD */
.card {
  background: #0f172a;
  border-radius: 15px;
  padding: 20px;
  margin-top: 20px;
}

/* UPLOAD */
.upload {
  border: 2px dashed #38bdf8;
  padding: 25px;
  text-align: center;
  cursor: pointer;
  border-radius: 10px;
}

.upload:hover {
  background: rgba(56,189,248,0.1);
}

/* BUTTON */
button {
  padding: 10px 20px;
  border: none;
  background: #38bdf8;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #0ea5e9;
}

/* IMAGES */
.viewer {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.viewer img {
  width: 100%;
  border-radius: 10px;
}

/* LOADER */
.loader {
  display: none;
  margin-top: 10px;
}

/* STATUS */
.status {
  margin-top: 15px;
  font-size: 14px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2> AI Lab</h2>
  <p>Image Colorization</p>

  <hr>

  <p>✔ CNN Model</p>
  <p>✔ Preprocessing</p>
  <p>✔ Output Generation</p>
</div>

<div class="main">

<div class="header">
  <h1>Colorization Dashboard</h1>
</div>

<div class="card">

  <label class="upload" for="file">
    📂 Upload B&W Image
  </label>
  <input type="file" id="file" accept="image/*" hidden>

  <br>
  <button onclick="upload()">Run Model</button>

  <div class="loader" id="loader">⏳ Processing with CNN...</div>

  <div class="status" id="status">Idle</div>

</div>

<div class="card viewer">
  <div>
    <h3>Original</h3>
    <img id="original">
  </div>

  <div>
    <h3>Colorized</h3>
    <img id="output">
    <br>
    <button onclick="download()">Download</button>
  </div>
</div>

</div>

<script>
let fileInput = document.getElementById("file");

document.querySelector(".upload").addEventListener("click", () => {
  fileInput.click();
});

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  document.getElementById("original").src = URL.createObjectURL(file);
  document.getElementById("status").innerText = "Image Loaded";
});

async function upload() {
  const file = fileInput.files[0];

  if (!file) {
    alert("Upload image first");
    return;
  }

  let formData = new FormData();
  formData.append("file", file);

  document.getElementById("loader").style.display = "block";
  document.getElementById("status").innerText = "Processing...";

  try {
    const response = await fetch("https://dl-miniproject-5.onrender.com/process", {
      method: "POST",
      body: formData
    });

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    document.getElementById("output").src = url;
    window.resultImage = url;

    document.getElementById("status").innerText = "Completed ✅";

  } catch (err) {
    document.getElementById("status").innerText = "Error ❌";
  }

  document.getElementById("loader").style.display = "none";
}

function download() {
  const a = document.createElement("a");
  a.href = window.resultImage;
  a.download = "colorized.jpg";
  a.click();
}
</script>

</body>
</html>
