<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Image Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      color: #38bdf8;
      font-size: 2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .upload-box {
      border: 2px dashed #38bdf8;
      padding: 30px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 15px;
    }

    .upload-box:hover {
      background: rgba(56,189,248,0.1);
    }

    input {
      display: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    .images {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      gap: 10px;
      flex-wrap: wrap;
    }

    img {
      width: 48%;
      border-radius: 10px;
      border: 2px solid #334155;
    }

    .loader {
      margin-top: 15px;
      display: none;
    }

    .spinner {
      border: 4px solid #334155;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<h1>🧠 AI Image Processing Dashboard</h1>

<div class="card">

  <label class="upload-box" for="file">
    📂 Click or Drag Image Here
  </label>

  <input type="file" id="file" accept="image/*">

  <br>

  <button onclick="upload()">Process Image</button>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>

  <div class="images">
    <img id="original" />
    <img id="output" />
  </div>

</div>

<script>
let fileInput = document.getElementById("file");

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  document.getElementById("original").src = URL.createObjectURL(file);
});

async function upload() {
  const file = fileInput.files[0];

  if (!file) {
    alert("Please select an image");
    return;
  }

  let formData = new FormData();
  formData.append("file", file);

  document.getElementById("loader").style.display = "block";

  try {
    const response = await fetch("https://dl-miniproject-5.onrender.com/process");
      method: "POST",
      body: formData
    });

    const blob = await response.blob();

    document.getElementById("output").src = URL.createObjectURL(blob);

  } catch (err) {
    alert("Error processing image");
  }

  document.getElementById("loader").style.display = "none";
}
</script>

</body>
</html>
