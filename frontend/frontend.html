<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Image Colorization</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  padding: 20px;
  border-bottom: 1px solid #1e293b;
}

.header h1 {
  color: #38bdf8;
}

.header p {
  color: #94a3b8;
  font-size: 14px;
}

/* CARD */
.container {
  max-width: 800px;
  margin: 30px auto;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* UPLOAD */
.upload {
  border: 2px dashed #38bdf8;
  padding: 30px;
  border-radius: 12px;
  cursor: pointer;
}

.upload:hover {
  background: rgba(56,189,248,0.1);
}

input {
  display: none;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #0ea5e9;
}

/* IMAGES */
.images {
  display: flex;
  gap: 15px;
  margin-top: 25px;
  flex-wrap: wrap;
  justify-content: center;
}

.box {
  width: 45%;
}

img {
  width: 100%;
  border-radius: 10px;
  border: 2px solid #1e293b;
}

/* LOADER */
.loader {
  display: none;
  margin-top: 20px;
}

.spinner {
  border: 4px solid #1e293b;
  border-top: 4px solid #38bdf8;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* STEPS */
.steps {
  text-align: left;
  margin-top: 30px;
  color: #cbd5f5;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🧠 AI Image Colorization System</h1>
  <p>Deep Learning based Colorization using CNN</p>
</div>

<div class="container">

  <label class="upload" for="file">
    📂 Upload Black & White Image
  </label>

  <input type="file" id="file" accept="image/*">

  <br>
  <button onclick="upload()">Generate Color Image</button>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Applying CNN Model...</p>
  </div>

  <div class="images">
    <div class="box">
      <h3>Original</h3>
      <img id="original">
    </div>

    <div class="box">
      <h3>Colorized Output</h3>
      <img id="output">
    </div>
  </div>

  <div class="steps">
    <h3>🔍 Process Flow</h3>
    <p>1. Input grayscale image</p>
    <p>2. Preprocessing & noise removal</p>
    <p>3. CNN predicts color channels</p>
    <p>4. Post-processing refinement</p>
    <p>5. Final colorized output</p>
  </div>

</div>

<script>
let fileInput = document.getElementById("file");

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  document.getElementById("original").src = URL.createObjectURL(file);
});

async function upload() {
  const file = fileInput.files[0];

  if (!file) {
    alert("Please upload an image");
    return;
  }

  let formData = new FormData();
  formData.append("file", file);

  document.getElementById("loader").style.display = "block";

  try {
    const response = await fetch("https://dl-miniproject-5.onrender.com/process", {
      method: "POST",
      body: formData
    });

    const blob = await response.blob();
    document.getElementById("output").src = URL.createObjectURL(blob);

  } catch (err) {
    alert("Error processing image");
  }

  document.getElementById("loader").style.display = "none";
}
</script>

</body>
</html>
