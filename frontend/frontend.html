<!DOCTYPE html>
<html>
<head>
  <title>DL Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6fb;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background-color: #6a0dad;
      color: white;
      position: fixed;
      padding: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
    }

    .sidebar a:hover {
      background-color: #8a2be2;
    }

    .main {
      margin-left: 240px;
      padding: 20px;
    }

    .header {
      background-color: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .card {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .upload-btn {
      background-color: #6a0dad;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .upload-btn:hover {
      background-color: #8a2be2;
    }

    .download-btn {
      background-color: green;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      display: none;
    }

    .download-btn:hover {
      background-color: darkgreen;
    }

    .images {
      display: flex;
      gap: 20px;
      margin-top: 15px;
    }

    .images img {
      width: 250px;
      border-radius: 10px;
      border: 2px solid #ddd;
    }

  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>DL Project</h2>
    <a href="#">Dashboard</a>
    <a href="#">Upload Image</a>
    <a href="#">Results</a>
    <a href="#">About</a>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="header">
      <h2>Image Colorization Dashboard</h2>
      <p>Convert black & white images into color using Deep Learning</p>
    </div>

    <!-- Upload -->
    <div class="card">
      <h3>📤 Upload Image</h3>
      <input type="file" id="fileInput">
      <br><br>
      <button class="upload-btn" onclick="processImage()">Process Image</button>
    </div>

    <!-- Results -->
    <div class="card">
      <h3>🖼️ Results</h3>
      <p>Input → Output</p>

      <div class="images">
        <img id="inputImg" src="" alt="Input Image">
        <img id="outputImg" src="" alt="Output Image">
      </div>

      <button class="download-btn" id="downloadBtn" onclick="downloadImage()">
        ⬇️ Download Color Image
      </button>
    </div>

  </div>

  <script>
    function processImage() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];

      if (!file) {
        alert("Please select an image first!");
        return;
      }

      // Show input image
      document.getElementById('inputImg').src = URL.createObjectURL(file);

      // Simulate backend response (replace with API call)
      setTimeout(() => {
        // Replace with real backend URL
        const outputUrl = URL.createObjectURL(file); 

        document.getElementById('outputImg').src = outputUrl;

        // Show download button
        document.getElementById('downloadBtn').style.display = "inline-block";

      }, 1000);
    }

    function downloadImage() {
      const img = document.getElementById('outputImg').src;

      const a = document.createElement('a');
      a.href = img;
      a.download = "colorized_image.png";
      a.click();
    }
  </script>

</body>
</html>
